<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Musikflotten AW</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a3d62;
    --blue: #1a6fa8;
    --sky: #22a6b3;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: rgba(10,61,98,0.12);
    --bg: #f4f7fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .login-box {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 340px; width: 100%;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    text-align: center;
  }
  .login-box .icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
  .login-box h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.25rem; }
  .login-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }
  .login-box input {
    width: 100%; border: 1px solid #dde5ed; border-radius: 10px;
    padding: 0.65rem 1rem; font-size: 0.92rem; font-family: 'DM Sans', sans-serif;
    background: #f7fafd; color: var(--text); outline: none; margin-bottom: 0.75rem;
  }
  .login-box input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,111,168,0.1); background: #fff; }
  .login-err { font-size: 0.82rem; color: #8b2020; margin-top: 0.25rem; display: none; }

  /* ADMIN PANEL */
  #admin-panel { display: none; }

  .topbar {
    background: var(--navy);
    color: #fff;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 { font-size: 1rem; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; font-size: 0.82rem; color: rgba(255,255,255,0.7); }
  .logout-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; border-radius: 8px; padding: 0.3rem 0.75rem;
    font-size: 0.8rem; font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: background 0.15s;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }

  .container { max-width: 680px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.75rem; }
  .stat-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; border: 1px solid var(--border); }
  .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 500; }
  .stat-card .value { font-size: 1.7rem; font-weight: 500; color: var(--navy); line-height: 1.1; margin-top: 0.2rem; }
  .stat-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }

  /* ADD FORM */
  .add-card { background: #fff; border-radius: 16px; padding: 1.25rem 1.5rem; border: 1px solid var(--border); margin-bottom: 1.5rem; }
  .add-card h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 500; margin-bottom: 0.75rem; }
  .add-row { display: flex; gap: 0.65rem; }
  .add-row input {
    flex: 1; border: 1px solid #dde5ed; border-radius: 10px;
    padding: 0.6rem 0.9rem; font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
    background: #f7fafd; color: var(--text); outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .add-row input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,111,168,0.1); background: #fff; }
  .btn-add {
    background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 0.6rem 1.25rem; font-size: 0.9rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--blue); }

  /* GUEST TABLE */
  .table-card { background: #fff; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  .table-header {
    padding: 1rem 1.5rem 0.75rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .table-header h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 500; }
  .refresh-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 0.28rem 0.75rem; font-size: 0.78rem; font-family: 'DM Sans', sans-serif;
    color: var(--muted); cursor: pointer; transition: border-color 0.15s;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

  .guest-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    transition: background 0.1s;
  }
  .guest-row:last-child { border-bottom: none; }
  .guest-row:hover { background: #f7fafd; }
  .guest-num { color: var(--muted); font-size: 0.78rem; min-width: 24px; }
  .guest-name { flex: 1; padding: 0 0.75rem; font-weight: 400; }
  .guest-date { font-size: 0.75rem; color: var(--muted); min-width: 90px; text-align: right; padding-right: 1rem; }
  .del-btn {
    background: none; border: 1px solid #f5b8b8; color: #c0392b;
    border-radius: 8px; padding: 0.25rem 0.65rem;
    font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: background 0.15s;
  }
  .del-btn:hover { background: #fdecea; }

  .empty-state { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.88rem; }

  .btn-primary {
    background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 0.65rem 1.25rem; font-size: 0.9rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--blue); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <span class="icon">🔒</span>
    <h2>Adminpanel</h2>
    <p>Musikflotten AW · 9 juni</p>
    <input type="password" id="pw-input" placeholder="Lösenord" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="btn-primary" style="width:100%" onclick="checkLogin()">Logga in</button>
    <div class="login-err" id="login-err">Fel lösenord</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="topbar">
    <h1>⛵ Musikflotten Admin</h1>
    <div class="topbar-right">
      <span id="topbar-count">0 anmälda</span>
      <button class="logout-btn" onclick="logout()">Logga ut</button>
    </div>
  </div>

  <div class="container">

    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Anmälda</div>
        <div class="value" id="stat-booked">–</div>
        <div class="sub">av 50 platser</div>
      </div>
      <div class="stat-card">
        <div class="label">Kvar</div>
        <div class="value" id="stat-left">–</div>
        <div class="sub">platser lediga</div>
      </div>
      <div class="stat-card">
        <div class="label">Fyllnadsgrad</div>
        <div class="value" id="stat-pct">–</div>
        <div class="sub">procent</div>
      </div>
    </div>

    <div class="add-card">
      <h3>Lägg till person</h3>
      <div class="add-row">
        <input type="text" id="add-first" placeholder="Förnamn" maxlength="50" onkeydown="if(event.key==='Enter')addGuest()">
        <input type="text" id="add-last" placeholder="Efternamn" maxlength="50" onkeydown="if(event.key==='Enter')addGuest()">
        <button class="btn-add" onclick="addGuest()">Lägg till</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h3>Gästlista</h3>
        <button class="refresh-btn" onclick="load()">↻ Uppdatera</button>
      </div>
      <div id="guest-list"><div class="empty-state">Laddar...</div></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://qvyhriezlmbtvbqgkehd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2eWhyaWV6bG1idHZicWdrZWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzEyMDUsImV4cCI6MjA5MTMwNzIwNX0.ZglABAz2vXDEtv5e-2BZHx-0EEkBq3f0TdIxkew4XeE';
  const ADMIN_PASSWORD = 'musikflotten2025';
  const MAX = 50;

  function checkLogin() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      load();
    } else {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('pw-input').value = '';
  }

  function headers() {
    return {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    };
  }

  function fmtDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  async function load() {
    const res = await fetch(SUPABASE_URL + '/rest/v1/guests?select=id,first_name,last_name,created_at&order=created_at.asc', { headers: headers() });
    const guests = await res.json();

    const booked = guests.length;
    const left = MAX - booked;
    const pct = Math.round(booked / MAX * 100);

    document.getElementById('stat-booked').textContent = booked;
    document.getElementById('stat-left').textContent = left;
    document.getElementById('stat-pct').textContent = pct + '%';
    document.getElementById('topbar-count').textContent = booked + ' anmälda';

    const list = document.getElementById('guest-list');
    if (guests.length === 0) {
      list.innerHTML = '<div class="empty-state">Ingen anmäld ännu.</div>';
      return;
    }
    list.innerHTML = guests.map((g, i) => `
      <div class="guest-row" id="row-${g.id}">
        <span class="guest-num">${i + 1}</span>
        <span class="guest-name">${g.first_name} ${g.last_name}</span>
        <span class="guest-date">${fmtDate(g.created_at)}</span>
        <button class="del-btn" onclick="deleteGuest('${g.id}', '${g.first_name}')">Ta bort</button>
      </div>
    `).join('');
  }

  async function addGuest() {
    const first = document.getElementById('add-first').value.trim();
    const last = document.getElementById('add-last').value.trim();
    if (!first || !last) return;

    await fetch(SUPABASE_URL + '/rest/v1/guests', {
      method: 'POST',
      headers: { ...headers(), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ first_name: first, last_name: last })
    });

    document.getElementById('add-first').value = '';
    document.getElementById('add-last').value = '';
    document.getElementById('add-first').focus();
    await load();
  }

  async function deleteGuest(id, name) {
    if (!confirm(`Ta bort ${name} från listan?`)) return;
    await fetch(SUPABASE_URL + '/rest/v1/guests?id=eq.' + id, {
      method: 'DELETE',
      headers: headers()
    });
    await load();
  }
</script>
</body>
</html>
